services:
  estbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estbot
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-eu-west-1}
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
    restart: unless-stopped
